---
# Credentials for gaining fallback admin access in Stalwart
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stalwart-recovery-admin
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: stalwart-recovery-admin
    creationPolicy: Owner
  data:
    - secretKey: STALWART_RECOVERY_ADMIN
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        key: "" # Populate with Kustomize
        property: recovery_admin

---
# Admin access to the Stalwart database
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stalwart-postgresql-admin-password
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: stalwart-postgresql-admin-password
    creationPolicy: Owner
  data:
    - secretKey: STALWART_POSTGRESQL_ADMIN_PASSWORD
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        key: "" # Populate with Kustomize
        property: password

---
# Cloudflare API token for managing Cloudflare resources related to the tb-dev cluster.
# Source: mzla/tb-dev/cloudflare in Secrets Manager (eu-central-1, 718959508124).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-secrets
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: cloudflare-secrets
    creationPolicy: Owner
  data:
    - secretKey: CLOUDFLARE_API_TOKEN
      remoteRef:
        key: "" # Populate with Kustomize
        property: apiToken
    - secretKey: CLOUDFLARE_ACCOUNT_ID
      remoteRef:
        key: "" # Populate with Kustomize
        property: accountID