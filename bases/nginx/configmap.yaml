---
# ConfigMap containing the nginx configuration file
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  labels:
    app.kubernetes.io/name: stalwart-nginx
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  # Provide an appropriate config file for your environment using Kustomize.
  #
  # This secret is an nginx configuration file. nginx has multiple sets of documentation for
  # different audiences, making it hard to refer to one place for info on this file. The top level
  # of that documentation is here: https://nginx.org/en/docs/
  nginx.conf: |
    # Nginx does support special mail proxy services --
    #     https://docs.nginx.com/nginx/admin-guide/mail-proxy/mail-proxy/
    # -- but they are built around the needs of legacy mail systems. Stalwart handles these things
    # for us internally now, and we should allow it to do so. Therefore, we use a standard TCP
    # reverse proxy configuration for our purposes.
    #    https://docs.nginx.com/nginx/admin-guide/load-balancer/tcp-udp-load-balancer/

    stream {
      # The upstream name "stalwart-mail" is for reference in the "server" blocks below.
      upstream stalwart-mail {
        # The server name "stalwart-mail" below refers to the Kubernetes Service of that name. We
        # pass this traffic directly through for Stalwart to deal with.
        server stalwart-mail;
      }
      server {
        listen 465;
        proxy_connect_timeout 1s;
        proxy_timeout 3s;
        proxy_pass stalwart-mail;
      }
      server {
        listen 993;
        proxy_connect_timeout 1s;
        proxy_timeout 3s;
        proxy_pass stalwart-mail;
      }
      server {
        listen 4190;
        proxy_connect_timeout 1s;
        proxy_timeout 3s;
        proxy_pass stalwart-mail;
      }
    }

    # HTTP traffic to Stalwart is always encrypted. We need to decrypt it here so we can determine
    # if the traffic, based on the HTTP path, is permissible. While most of Stalwart's API functions
    # are acceptable or required for users to access, we wish to deny access to any administrative
    # functions, even user account self-service functions (since these are handled instead by our
    # own thunderbird-accounts project). All other HTTP-based traffic is sent on to the real
    # Stalwart host upstream.
    http {
      upstream stalwart-http {
        server stalwart-mail;
      }
      server {
        
      }
    }