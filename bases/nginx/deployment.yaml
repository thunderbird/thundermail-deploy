---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stalwart-nginx
  template:
    metadata:
      labels:
        app: stalwart-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.31
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "0.5"
              memory: 0.5Gi
            limits:
              cpu: "1"
              memory: 1Gi
          ports:
            - name: smtps
              containerPort: 465
            - name: imaps
              containerPort: 993
            - name: sieve
              containerPort: 4190
            - name: https
              containerPort: 443
            - name: nginx-health
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: nginx-health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: nginx-health
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx
              subPath: nginx.conf
            - name: ssl-certificate
              mountPath: /etc/nginx
              subPath: domain.crt
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
            optional: false
            items:
              - key: nginx.conf
                path: nginx.conf
        - name: ssl-certificate
          secret:
            secretName: ""  # Specify with Kustomize
            optional: false
            items:
              - key: CERTIFICATE_CHAIN
                path: domain.crt
              - key: PRIVATE_KEY
                path: domain.key
