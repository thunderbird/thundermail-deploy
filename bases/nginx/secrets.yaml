---
# SSL certificate and private key for *.dev-thundermail.com
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dev-thundermail.com-ssl
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: dev-thundermail.com-ssl
    creationPolicy: Owner
  data:
    - secretKey: CERTIFICATE_CHAIN
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        key: "" # Populate with Kustomize
        property: certificate-chain
    - secretKey: PRIVATE_KEY
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        key: "" # Populate with Kustomize
        property: private-key
