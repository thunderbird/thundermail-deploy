---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-migration-proxy-config
  namespace: thundermail
  labels:
    app.kubernetes.io/name: stalwart-migration-proxy-config
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  # Provide an appropriate config file for your environment using Kustomize. Duplicate this config
  # in an override and review the entire configuration. No matter how you cut it, you will need to
  # do pervasive overrides to this file with Kustomize; therefore, we have not marked every case
  # where changes must be made.
  #
  # The format of this config file is explained here:
  #    https://stalw.art/docs/migration/proxy/configuration/
  #
  # Example configs for our use case can be found here:
  #    https://stalw.art/docs/migration/proxy/examples/stalwart-upgrade/
  #
  # A specific config example which looks very much like what we need can be found here:
  #    https://github.com/stalwartlabs/proxy/blob/main/resources/config.stalwart-upgrade.toml
  #

  config.toml: |
    [server]
    threads = 0
    hostname = ""
    
    # When K8s wants to stop a container, it sends a SIGTERM to it. The Stalwart proxy will then
    # stop taking new connections, allowing existing ones to drain for the `shutdown_grace` period.
    # This value needs to correspond to the Deployment's terminationGracePeriodSeconds option.
    # See shutdown_grace here: https://stalw.art/docs/migration/proxy/configuration/#server-options
    # And terminationGracePeriodSeconds here: https://stalw.art/docs/migration/proxy/configuration/#server-options
    shutdown_grace = 30s

    # These options should probably remain unset considering that our backend hosts are load
    # balancers. If the LB counts as one host, then that's a full outage at the proxy level. We
    # should ensure our autoscaling is appropriate so this doesn't happen.
    # https://stalw.art/docs/migration/proxy/destinations/#health-and-resilience
    # host_down_threshold = 5
    # host_down_cooldown = 30s
    # backend_connect_retries = 1

    # Override the log level here, or with the RUST_LOG env-var. Valid values are listed here:
    # https://docs.rs/log/latest/log/enum.Level.html
    log_level = "info"  

    [tls.certificate.primary]
    cert = "/etc/proxy/tls.crt"
    key = "/etc/proxy/tls.key"
    default = true

    # Populate "subjects" with Kustomize only if the certificate itself does not refer to the full
    # set of domain names served by this proxy and this cert.

    # subjects = [ "mail.example.com", "*.example.com" ]

    [tls.protocols]
    min_version = "1.2" # Can also be "1.3" if we want to force the upgrade   
    ignore_client_order = false
    
    # Populate "disable_cipher_suites" if we want to reinforce encryption standards
    # disable_cipher_suites = [] # 

    # Destination naming should be inclusive of at least a cluster name and K8s namespace. This
    # allows us to build segregated Stalwart installs across namespaces and still proxy them.
    # Hostname DNS records are resolved at connection time and not cached in Stalwart, so we
    # **do not** need to bounce Stalwart if we change the record. Ref:
    # https://stalw.art/docs/migration/proxy/destinations/#host-and-endpoints
    [destination.old]
    host = ""
    tls_server_name = ""
    proxy_protocol = true

    [destination.new]
    host = ""
    tls_server_name = ""
    proxy_protocol = true

    # Explicitly list all supported ports in the old and new installations.
    # "forwarding = proxy" uses PROXY protocol v2 with Stalwart backends and is the correct setting
    # for Stalwart backends that are not HTTP-based. HTTP protocols instead get a boolean value
    # indicating the use of the X-Forwarded-For header.
    # https://stalw.art/docs/migration/proxy/destinations/#client-identity-forwarding
    [destination.old.protocol.http]
    port = 443
    tls = "implicit"
    forwarding = true
    
    [destination.old.protocol.smtp]
    port = 465
    tls = "implicit"
    forwarding = "proxy"
    
    [destination.old.protocol.submission]
    port = 587
    tls = "starttls"
    forwarding = "proxy"
    
    [destination.old.protocol.imap]
    port = 993
    tls = "implicit"
    forwarding = "proxy"
    
    [destination.old.protocol.managesieve]
    port = 4190
    tls = "starttls"
    forwarding = "proxy"
    
    [destination.new.protocol.http]
    port = 443
    tls = "implicit"
    forwarding = true
    
    [destination.new.protocol.smtp]
    port = 465
    tls = "implicit"
    forwarding = "proxy"
    
    [destination.new.protocol.submission]
    port = 587
    tls = "starttls"
    forwarding = "proxy"
    
    [destination.new.protocol.imap]
    port = 993
    tls = "implicit"
    forwarding = "proxy"
    
    [destination.new.protocol.managesieve]
    port = 4190
    tls = "starttls"
    forwarding = "proxy"
    
    # Listeners describe services listening on ports which will route to the above destinations.
    # "proxy_protocol = 'off'" (the default value, explicit in our config) disables the use of
    # another mail proxy external to our systems. We do not currently use the proxy_protocol
    # directive in the nginx proxy config, so traffic from that source should work just fine. If we
    # enable nginx's proxy_protocol, we must set the Stalwart proxy's `proxy_protocol` to either
    # "optional" or "required" and add a `proxy_trusted` setting. Ref:
    # https://stalw.art/docs/migration/proxy/listeners/#listener-options

    [listener.https]
    protocol = "http"
    proxy_protocol = "off"
    forwarded = "on"  # Not sure about this value, since the docs only describe the "off" value.
    bind = ["0.0.0.0:443", "[::]:443"]
    tls = "implicit"

    [listener.submissions]
    protocol = "submission"
    proxy_protocol = "off"
    bind = ["0.0.0.0:465", "[::]:465"]
    tls = "implicit"

    [listener.submission]
    protocol = "submission"
    proxy_protocol = "off"
    bind = ["0.0.0.0:587", "[::]:587"]
    tls = "starttls"

    [listener.imaps]
    protocol = "imap"
    proxy_protocol = "off"
    bind = ["0.0.0.0:993", "[::]:993"]
    tls = "implicit"

    [listener.managesieve]
    protocol = "managesieve"
    proxy_protocol = "off"
    bind = ["0.0.0.0:4190", "[::]:4190"]
    tls = "starttls"

    # Opting not to set any capabilities options, relying on the defaults. If we want to change
    # things like the IMAP response banner to include our service name/branding, we can do that
    # in these sections.
    # Ref: https://stalw.art/docs/migration/proxy/listeners/#advertised-capabilities-and-banners
    # [capabilities.imap]
    # banner = "Whatever"
    # # etc.

    # When Stalwart handles requests with oauth tokens, the below option determines which claim from
    # the JWT gets used to look up the account and determine request routing.
    # https://stalw.art/docs/migration/proxy/listeners/#oauth-identity-claim
    # [oauth]
    # jwt_username_claim = "email"

    [mapping]
    source = "redis"
    normalize = "lowercase"

    # Choosing Redis as the mapping data backend, since it is the simplest mechanism to work with
    # that allows us to run the proxy in redundant fashion. It also prevents us from having to check
    # credentials into this repo in plaintext.
    [mapping.redis]
    url = "redis://stalwart-migration-proxy-redis:6379"
    key_prefix = "route:"

    # The admin block exposes the internal API that we use to manage accounts. This needs to be
    # exposed to TailScale for human use and to Accounts for API use.
    [admin]
    bind = "[::]:8080"
    tls = "implicit"

    # This would be the token we use to auth against this env, but we override this with the
    # PROXY_ADMIN_TOKEN environment variable. An alternate approach would involve mounting the
    # secret as a volume and mapping it to this file. Regardless of source, this must be at least 32
    # chars long.
    # bearer_token_file = "/etc/proxy/admin.token"

    # Global routing options.
    [routing]
    default_destination = "new"
    smtp_passthrough_destination = "new"

    # NOTE: The following commentary and settings related to HTTP request routing have been taken
    # directly from the sample config found here:
    # https://github.com/stalwartlabs/proxy/blob/main/resources/config.stalwart-upgrade.toml

    # HTTP routing. Rules are evaluated top to bottom and the first match wins. The web interfaces
    # and login endpoints differ between the two versions, so a handful of paths that are unique to
    # each version are pinned to the backend that serves them. The OAuth token exchange is shared,
    # so it is split by the client_id present in the request body. Everything else, including JMAP,
    # WebDAV and the JMAP session resource, carries credentials and is routed by the account those
    # credentials identify, falling back to the default destination when no account can be
    # determined.
    
    # Endpoints served only by the old deployment.
    [[http.route]]
    match = "/api/oauth"
    destination = "old"
    [[http.route]]
    match = "/authorize"
    destination = "old"
    [[http.route]]
    match = "/authorize/**"
    destination = "old"
    
    # Endpoints served only by the new deployment.
    [[http.route]]
    match = "/api/auth"
    destination = "new"
    [[http.route]]
    match = "/api/discover/**"
    destination = "new"
    [[http.route]]
    match = "/admin/**"
    destination = "new"
    [[http.route]]
    match = "/account/**"
    destination = "new"
    [[http.route]]
    match = "/login"
    destination = "new"
    [[http.route]]
    match = "/device"
    destination = "new"
    
    # OAuth token exchange is shared; route it by the web client that requested it.
    # Add matching mapping entries:  webadmin  old   and   stalwart-webui  new
    [[http.route]]
    match = "/auth/token"
    extract = { from = "body", regex = "client_id=([^&]+)" }
    fallback = "old"
    
    # Everything else: route by the authenticated account, fall back to default.
    [[http.route]]
    match = "/**"
    extract = { from = "authorization" }
    fallback = "default"
