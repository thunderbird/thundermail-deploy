---
# Bearer token for accessing Stalwart Proxy's API
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stalwart-proxy-bearer-token
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: stalwart-proxy-bearer-token
    creationPolicy: Owner
  data:
    - secretKey: STALWART_PROXY_BEARER_TOKEN
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        key: "" # Populate with Kustomize
        property: recovery_admin

