---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: thundermaill
  annotations:
    # Arbitrarily picking 3 to leave some room for earlier scaffolding
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      initContainers:
        # Resolve ${VAR} placeholders in setup.cfg using envsubst.
        # Mordred does not do env var substitution natively.
        - name: envsubst
          image: 826971876779.dkr.ecr.us-east-1.amazonaws.com/bitergia/bitergia-analytics:0.38.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /tmpl/setup.cfg /conf/setup.cfg
              echo '{}' > /conf/aliases.json
              for var in OPENSEARCH_MORDRED_USER OPENSEARCH_MORDRED_PASSWORD OPENSEARCH_HOST \
                         GITHUB_API_TOKEN BUGZILLA_API_KEY PONTOON_SESSION_ID \
                         SORTINGHAT_ADMIN_USERNAME SORTINGHAT_ADMIN_PASSWORD; do
                val=$(printenv "$var" || true)
                if [ -n "$val" ]; then
                  sed -i 's|${'"$var"'}|'"$val"'|g' /conf/setup.cfg
                fi
              done
          envFrom:
            - secretRef:
                name: mordred-credentials
          env:
            - name: OPENSEARCH_HOST
              value: "vpc-bitergia-opensearch-5h2z6q3qfwytnazavcog5lxcsa.eu-central-1.es.amazonaws.com"
            - name: SORTINGHAT_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sortinghat-credentials
                  key: admin-username
            - name: SORTINGHAT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sortinghat-credentials
                  key: admin-password
          volumeMounts:
            - name: config-template
              mountPath: /tmpl/setup.cfg
              subPath: setup.cfg
            - name: config-rendered
              mountPath: /conf
      containers:
        - name: mordred
          image: 826971876779.dkr.ecr.us-east-1.amazonaws.com/bitergia/bitergia-analytics:0.38.1
          envFrom:
            - secretRef:
                name: mordred-credentials
          env:
            - name: OPENSEARCH_HOST
              value: "vpc-bitergia-opensearch-5h2z6q3qfwytnazavcog5lxcsa.eu-central-1.es.amazonaws.com"
            - name: SORTINGHAT_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sortinghat-credentials
                  key: admin-username
            - name: SORTINGHAT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sortinghat-credentials
                  key: admin-password
          volumeMounts:
            - name: config-rendered
              mountPath: /home/grimoire/conf
            - name: projects
              mountPath: /home/grimoire/data-sources/projects.json
              subPath: projects.json
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
      volumes:
        - name: config-template
          configMap:
            name: mordred-config
        - name: config-rendered
          emptyDir: {}
        - name: projects
          configMap:
            name: mordred-projects1
