# Throughout these documents, we make reference to VPC vpc-0e0f4b8d603d463e0,
#  which is the "mzla-tb-dev-vpc".

# Build security groups for each app
---
apiVersion: ec2.services.k8s.aws/v1alpha1
kind: SecurityGroup
metadata:
  name: stalwart-server
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  description: SG for Stalwart server containers running in Kubernetes
  name: stalwart-server
  tags:
    Name: stalwart-server
  vpcID: vpc-0e0f4b8d603d463e0
  egressRules:
    - fromPort: 0
      toPort: 0
      ipProtocol: "-1"
      ipRanges:
        - cidrIP: "0.0.0.0/0"
          description: "Allow all egress"
  ingressRules:
    - fromPort: 8080
      toPort: 8080
      ipProtocol: tcp
      userIDGroupPairs:
        - groupID: sg-08c51d43c4a250a81
          description: Kubelet probes from EKS cluster SG (mzla-eks-tb-dev01)

# Build SecurityGroupPolicies matching each pod deployment with each app SG
# (https://github.com/aws/amazon-vpc-resource-controller-k8s/blob/master/config/crd/bases/vpcresources.k8s.aws_securitygrouppolicies.yaml)
---
apiVersion: vpcresources.k8s.aws/v1beta1
kind: SecurityGroupPolicy
metadata:
  name: stalwart-server
  namespace: thundermail
spec:
  podSelector:
    matchLabels:
      app: stalwart
  securityGroups:
    groupIds:
      - sg-07624df6ceb8865ec  # EKS cluster security group
      # - Add ID for stalwart-server app SG

# Build security groups for each backend service (RDS, Redis) allowing access from the app SGs
---
apiVersion: ec2.services.k8s.aws/v1alpha1
kind: SecurityGroup
metadata:
  name: stalwart-rds-postgresql
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  description: SG for Stalwarts backend PostgreSQL instance on RDS
  name: stalwart-rds-postgresql
  tags:
    Name: stalwart-rds-postgresql
  vpcID: vpc-0e0f4b8d603d463e0
  egressRules:
    - fromPort: 0
      toPort: 0
      ipProtocol: "-1"
      ipRanges:
        - cidrIP: "0.0.0.0/0"
          description: "Allow all egress"
  ingressRules: []
