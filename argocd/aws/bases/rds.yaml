---
# RDS PostgreSQL instance for Stalwart's relational database backend.
# Master password sourced from K8s secret (synced by ExternalSecret).
apiVersion: rds.services.k8s.aws/v1alpha1
kind: DBSubnetGroup
metadata:
  name: stalwart-rds-subnet-group
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: stalwart-rds-subnet-group
  description: "Stalwart RDS subnet group - private subnets in tb-dev VPC"
  subnetIDs:
    - "subnet-044e18f3022fb9ee1"  # eu-central-1a
    - "subnet-01084662e5e16dce9"  # eu-central-1b
  tags:
    - key: project
      value: thundermail
    - key: managed-by
      value: ack

---
apiVersion: rds.services.k8s.aws/v1alpha1
kind: DBInstance
metadata:
  name: stalwart-postgresql
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  dbInstanceIdentifier: stalwart-postgresql
  engine: postgresql
  engineVersion: "18.3"
  dbInstanceClass: db.t4g.small
  allocatedStorage: 20
  enableStorageAutoscaling: yes
  maxAllocatedStorage: 50
  storageType: gp3
  storageEncrypted: true
  masterUsername: admin
  masterUserPassword:
    namespace: thundermail
    name: STALWART_POSTGRESQL_ADMIN_PASSWORD
  dbSubnetGroupName: stalwart-rds-subnet-group
  # vpcSecurityGroupIDs:
  #   - "TODO: BUILD SGS AND POPULATE THIS FIELD"
  multiAZ: false
  backupRetentionPeriod: 7
  preferredBackupWindow: "03:00-04:00"
  preferredMaintenanceWindow: "sun:05:00-sun:06:00"
  deletionProtection: true
  copyTagsToSnapshot: true
  tags:
    - key: project
      value: thundermail
    - key: managed-by
      value: ack

