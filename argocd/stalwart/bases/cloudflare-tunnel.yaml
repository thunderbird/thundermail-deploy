---
# Cloudflare Tunnel for dev-thundermail.com: our various mail services
apiVersion: networking.cfargotunnel.com/v1alpha2
kind: Tunnel
metadata:
  name: stalwart-tunnel
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  newTunnel:
    name: stalwart-mzla-eks-tb-dev01
  cloudflare:
    domain: dev-thundermail.com
    secret: cloudflare-secrets
    accountId: "407a3cd7b36b3ec71bf765856c90ae8c"

---
# Bind the above tunnel to the Stalwart service
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: tb-dev-stalwart-admin-binding
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "5"
subjects:
  - kind: Service
    name: stalwart
    spec:
      fqdn: mail.dev-thundermail.com
      protocol: http
      target: http://stalwart.stalwart.svc:8080
tunnelRef:
  kind: Tunnel
  name: stalwart-admin-tunnel

