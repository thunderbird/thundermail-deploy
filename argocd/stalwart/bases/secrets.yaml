---
# Import secrets for use with Stalwart
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stalwart-recovery-admin
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: stalwart-recovery-admin
    creationPolicy: Owner
  data:
    - secretKey: STALWART_RECOVERY_ADMIN
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        key: mzla/tb-dev/stalwart-recovery-admin
        property: recovery_admin

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stalwart-postgresql-admin-password
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: stalwart-recovery-admin
    creationPolicy: Owner
  data:
    - secretKey: STALWART_POSTGRESQL_ADMIN_PASSWORD
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        key: mzla/tb-dev/stalwart-postgresql-admin-credential
        property: password