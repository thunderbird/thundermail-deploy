---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart
  namespace: thundermail
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stalwart
  template:
    metadata:
      labels:
        app: stalwart
    spec:
      securityContext:
        fsGroup: 2000
        runAsUser: 2000
        runAsGroup: 2000
      volumes:
        - name: config
          configMap:
            name: stalwart-config
            items:
              - key: config.json
                path: config.json
      containers:
        - name: stalwart
          image: stalwartlabs/stalwart:v0.16.1
          imagePullPolicy: IfNotPresent
          command: ["/bin/cat", "/etc/stalwart/config.json"]
          args: []
          resources:
            requests:
              cpu: 1
              memory: 2Gi
            limits:
              cpu: 2
              memory: 4Gi
          args:
            - "--config"
            - "/etc/stalwart/config.json"
          env:
            # - name: STALWART_ROLE
            #   value: https://stalw.art/docs/configuration/environment-variables/#clustering
            - name: STALWART_PUSH_SHARD
              value: ""
            - name: STALWART_RECOVERY_MODE
              value: "false"
            - name: STALWART_RECOVERY_MODE_PORT
              value: "8080"
            - name: STALWART_RECOVERY_MODE_LOG_LEVEL
              value: info
            # In the config.json that we feed Stalwart, we instruct Stalwart to pull the
            # database password from this environment variable. Here, we populate this
            # variable from a secret, preventing us from ever having to cleartext it.)
            - name: STALWART_POSTGRESQL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-postgresql-admin-password
                  key: STALWART_POSTGRESQL_ADMIN_PASSWORD
            - name: STALWART_RECOVERY_ADMIN
              valueFrom:
                secretKeyRef:
                  name: stalwart-recovery-admin
                  key: STALWART_RECOVERY_ADMIN
          ports:
            - name: smtp
              containerPort: 25
            - name: smtps
              containerPort: 465
            - name: submission
              containerPort: 587
            - name: imap
              containerPort: 143
            - name: imaps
              containerPort: 993
            - name: pop3
              containerPort: 110
            - name: pop3s
              containerPort: 995
            - name: sieve
              containerPort: 4190
            - name: http
              containerPort: 80
            - name: https
              containerPort: 443
            - name: mgmt
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: mgmt
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: mgmt
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/stalwart/