# The stalwart-migration-proxy service creates a public load balancer exposing
# our migration proxy to the world.
apiVersion: v1
kind: Service
metadata:
  name: stalwart-migration-proxy
  annotations:
    # Subnets: mzla-tb-prod-public-eu-central-1a, mzla-tb-prod-public-eu-central-1b
    service.beta.kubernetes.io/aws-load-balancer-subnets: "subnet-0807adf98a8c7f4fd, subnet-07d002df085141478"
    service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: "environment=not_set,project=not_set"
    service.beta.kubernetes.io/aws-load-balancer-security-groups: "sg-0f7d53a231acfb6fd" # stalwart-migration-proxy-lb

---
# The stalwart-migration-proxy-redis service maps to the Serverless Redis cache's master endpoint
apiVersion: v1
kind: Service
metadata:
  name: stalwart-migration-proxy-redis
spec:
  externalName: "stalwart-migration-proxy-redis.cfoyzs.ng.0001.euc1.cache.amazonaws.com"
