---
apiVersion: ec2.services.k8s.aws/v1alpha1
kind: SecurityGroup
metadata:
  name: stalwart-server
  namespace: thundermail
  annotations:
    services.k8s.aws/adoption-policy: "adopt-or-create"
    services.k8s.aws/adoption-fields: |
      {"id": "sg-07f59e7e9ea8b2f0f"}
spec:
  vpcID: vpc-0c7a0ef4fdd2b8275
  ingressRules:
    - fromPort: 8080
      toPort: 8080
      ipProtocol: tcp
      userIDGroupPairs:
        - description: Kubelet probes from EKS cluster SG
          groupID: sg-08711bcc50c7b1e18 # eks-cluster-sg-mzla-eks-tb-prod01
        - description: Allow management port traffic only from other stalwart-server sources
          groupID: sg-07f59e7e9ea8b2f0f # stalwart-server
    - fromPort: 465
      toPort: 465
      ipProtocol: tcp
      userIDGroupPairs:
        - description: Allow SMTPS service traffic from the public stalwart load balancer
          groupID: sg-063486073b9b2ba48  # k8s-thunderm-stalwart-ca45b4cfeb
    - fromPort: 587
      toPort: 587
      ipProtocol: tcp
      userIDGroupPairs:
        - description: Allow SMTP Submission service traffic from the public stalwart load balancer
          groupID: sg-063486073b9b2ba48  # k8s-thunderm-stalwart-ca45b4cfeb
    - fromPort: 993
      toPort: 993
      ipProtocol: tcp
      userIDGroupPairs:
        - description: Allow IMAPS service traffic from the public stalwart load balancer
          groupID: sg-063486073b9b2ba48  # k8s-thunderm-stalwart-ca45b4cfeb
    - fromPort: 4190
      toPort: 4190
      ipProtocol: tcp
      userIDGroupPairs:
        - description: Allow ManageSieve service traffic from the public stalwart load balancer
          groupID: sg-063486073b9b2ba48  # k8s-thunderm-stalwart-ca45b4cfeb
    - fromPort: 443
      toPort: 443
      ipProtocol: tcp
      userIDGroupPairs:
        - description: Allow HTTPS service traffic from the public stalwart load balancer
          groupID: sg-063486073b9b2ba48  # k8s-thunderm-stalwart-ca45b4cfeb

---
apiVersion: vpcresources.k8s.aws/v1beta1
kind: SecurityGroupPolicy
metadata:
  name: stalwart-server
  namespace: thundermail
spec:
  securityGroups:
    groupIds:
      - sg-01502e50caccc6795  # EKS cluster
      - sg-07f59e7e9ea8b2f0f  # Stalwart pods

---
apiVersion: ec2.services.k8s.aws/v1alpha1
kind: SecurityGroup
metadata:
  name: stalwart-elasticache-redis
  namespace: thundermail
  annotations:
    services.k8s.aws/adoption-policy: "adopt-or-create"
    services.k8s.aws/adoption-fields: |
      {"id": "sg-0f0b4f8140771a1cf"}
spec:
  vpcID: vpc-0c7a0ef4fdd2b8275
  ingressRules:
    - fromPort: 6379
      toPort: 6379
      ipProtocol: tcp
      userIDGroupPairs:
        - description: Allow traffic from Stalwarts server containers
          groupID: sg-07f59e7e9ea8b2f0f  # Stalwart pods
