# This file contains no overlays for the stalwart-mail and stalwart-https services, which are
# cluster-internal and do not require additional environment configuration.

---
apiVersion: v1
kind: Service
metadata:
  name: stalwart-public
  annotations:
    # Subnets: mzla-tb-dev-public-eu-central-1a, mzla-tb-dev-public-eu-central-1b"
    service.beta.kubernetes.io/aws-load-balancer-subnets: "subnet-0f9e53dca9f65b704, subnet-05af2f16f56e5b830"
    service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: "environment=prod,project=mzla-tb-dev"

---
apiVersion: v1
kind: Service
metadata:
  name: stalwart-admin
  annotations:
    # Subnets: mzla-tb-dev-private-eu-central-1a, mzla-tb-dev-private-eu-central-1b
    service.beta.kubernetes.io/aws-load-balancer-subnets: "subnet-044e18f3022fb9ee1, subnet-01084662e5e16dce9"
    service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: "environment=prod,project=mzla-tb-dev"
    service.beta.kubernetes.io/aws-load-balancer-security-groups: "sg-003b6b400b4c35131" # stalwart-admin-lb
